<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventOra - Create Event Details</title>
  <link rel="stylesheet" href="../../src/styles/tokens.css" />
  <link rel="stylesheet" href="../../src/styles/base.css" />
  <link rel="stylesheet" href="../../src/styles/components.css" />
  <link rel="stylesheet" href="../../src/styles/responsive.css" />
  <style>
    .create-shell { padding:28px; background:var(--surface-soft); min-height:100vh; }
    .create-header { margin-bottom:24px; }
    .create-header a { display:inline-flex; margin-bottom:14px; color:var(--muted); text-decoration:none; font-size:0.86rem; }
    .create-header h1 { margin:0 0 6px; font-size:1.6rem; }
    .create-header p { margin:0; color:var(--muted); font-size:0.9rem; }
    .stepper { display:grid; grid-template-columns:repeat(4,1fr); margin:28px 0 34px; position:relative; }
    .stepper::before { content:""; position:absolute; top:13px; left:8%; right:8%; height:1px; background:var(--border); }
    .step-item { position:relative; display:grid; justify-items:center; gap:8px; color:var(--muted); font-size:0.76rem; z-index:1; }
    .step-number { width:28px; height:28px; border-radius:999px; display:grid; place-items:center; background:#e5e7eb; color:var(--muted); font-weight:700; }
    .step-item.done .step-number { background:var(--success); color:#fff; }
    .step-item.active { color:var(--primary); font-weight:700; }
    .step-item.active .step-number { background:var(--primary); color:#fff; }
    .create-card { border:1px solid var(--border); border-radius:var(--radius-lg); background:var(--surface); box-shadow:var(--shadow); padding:24px; }
    .create-card h2 { margin:0 0 22px; font-size:1rem; }
    .form-label { display:grid; gap:8px; margin-bottom:18px; color:var(--muted); font-size:0.76rem; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; }
    .form-label input, .form-label textarea { width:100%; min-height:42px; border:1px solid var(--border); border-radius:var(--radius-sm); padding:0 12px; background:#fff; color:var(--text); font-size:0.9rem; text-transform:none; letter-spacing:0; font-weight:500; }
    .form-label textarea { min-height:110px; padding:12px; resize:vertical; }
    .upload-box { display:grid; place-items:center; min-height:112px; border:1.5px dashed var(--border); border-radius:var(--radius-sm); background:#fff; color:var(--muted); text-align:center; font-size:0.82rem; }
    .upload-box strong { color:var(--primary); }
    .create-actions { display:flex; justify-content:space-between; gap:12px; margin-top:20px; }
  </style>
</head>
<body>
  <main class="create-shell">
    <section class="create-header">
      <a href="create-event-ticketing.html">← Back to Ticketing</a>
      <h1>Create New Event</h1>
      <p>Add poster, contact information, and organiser instructions.</p>
    </section>

    <section class="stepper">
      <div class="step-item done"><span class="step-number">1</span><span>Basic Info</span></div>
      <div class="step-item done"><span class="step-number">2</span><span>Ticketing</span></div>
      <div class="step-item active"><span class="step-number">3</span><span>Details</span></div>
      <div class="step-item"><span class="step-number">4</span><span>Review</span></div>
    </section>

    <section class="create-card">
      <h2>Step 3 — Event Details</h2>

      <label class="form-label">
        Event poster *
        <div class="upload-box">
          <div>
            Drag & drop poster here or <strong>browse</strong><br />
            <span>PNG, JPG up to 5MB · Recommended 1200x400px</span>
          </div>
        </div>
      </label>

      <div class="input-row-2">
        <label class="form-label">
          Contact person
          <input type="text" placeholder="e.g. Siti Noor" />
        </label>

        <label class="form-label">
          Contact email
          <input type="email" placeholder="society@utm.my" />
        </label>
      </div>

      <label class="form-label">
        Special instructions
        <textarea placeholder="Optional: dress code, materials to bring, prerequisite knowledge, or check-in notes."></textarea>
      </label>

      <div class="create-actions">
        <a class="button button-ghost" href="create-event-ticketing.html">Back</a>
        <a class="button button-primary" href="create-event-review.html">Next: Review →</a>
      </div>
    </section>
  </main>
</body>
</html>
