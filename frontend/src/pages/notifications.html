<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventOra - Notifications</title>
  <link rel="stylesheet" href="../../src/styles/tokens.css" />
  <link rel="stylesheet" href="../../src/styles/base.css" />
  <link rel="stylesheet" href="../../src/styles/components.css" />
  <link rel="stylesheet" href="../../src/styles/responsive.css" />
  <style>
    .notification-shell { max-width: 980px; margin: 0 auto; }
    .notification-toolbar { display:flex; justify-content:space-between; gap:12px; align-items:center; margin-bottom:18px; }
    .notification-list { display:grid; gap:12px; }
    .notification-item {
      display:grid;
      grid-template-columns:12px minmax(0, 1fr) auto;
      gap:14px;
      align-items:flex-start;
      padding:16px;
      border:1px solid var(--border);
      border-radius:var(--radius-md);
      background:var(--surface);
      box-shadow:var(--shadow);
    }
    .notification-item.unread { border-color:#bfdbfe; background:#eff6ff; }
    .unread-dot { width:10px; height:10px; margin-top:7px; border-radius:999px; background:var(--primary); }
    .notification-item.read .unread-dot { background:transparent; }
    .notification-content h3 { margin:0 0 6px; font-size:0.98rem; }
    .notification-content p { margin:0; color:var(--muted); line-height:1.5; font-size:0.9rem; }
    .notification-meta { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-top:10px; }
    .notification-actions { display:flex; justify-content:flex-end; }
    @media (max-width:720px) {
      .notification-toolbar { display:block; }
      .notification-toolbar .button { margin-top:12px; width:100%; }
      .notification-item { grid-template-columns:12px minmax(0, 1fr); }
      .notification-actions { grid-column:2; justify-content:flex-start; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="../../index.html" aria-label="EventOra home">
      <span class="brand-mark">E</span>
      <span>EventOra</span>
    </a>
    <nav class="desktop-nav">
      <a href="../../index.html">Events</a>
      <a href="tickets.html">My Tickets</a>
      <a href="notifications.html">Notifications <span class="badge badge-red" id="navUnreadBadge">0</span></a>
      <a href="profile.html">Profile</a>
    </nav>
    <a class="header-action" href="../../index.html">Browse Events</a>
  </header>

  <main class="app-shell">
    <section class="page-section notification-shell">
      <div class="section-heading">
        <div>
          <p class="eyebrow">In-app notification center</p>
          <h2>Notifications</h2>
        </div>
        <span class="badge badge-blue" id="unreadSummary">0 unread</span>
      </div>

      <div class="notification-toolbar">
        <p style="margin:0;color:var(--muted);font-size:0.9rem;">
          Showing notifications for your current user role.
        </p>
        <button class="button button-secondary" id="markAllReadBtn">Mark all as read</button>
      </div>

      <div class="notification-list" id="notificationList"></div>
    </section>
  </main>

  <script src="../js/notifications.js"></script>
</body>
</html>
